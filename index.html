<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數位遺言牆 — 如果今天是最後一天</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --deep: #0b1120;
    --card-bg: rgba(255,255,255,0.035);
    --card-border: rgba(255,255,255,0.08);
    --glow: rgba(180,210,255,0.12);
    --text: #c8d8f0;
    --text-dim: #6a7f9c;
    --accent: #7eb8f7;
    --accent2: #a89bd4;
    --warm: #e8c98a;
    --input-bg: rgba(255,255,255,0.04);
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  html { scroll-behavior: smooth; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  /* ── Stars ── */
  #stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d, 4s) var(--delay, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: var(--lo, 0.1); }
    to   { opacity: var(--hi, 0.6); transform: scale(1.3); }
  }
 
  /* ── Layout ── */
  .page { position: relative; z-index: 1; }
 
  /* ── Hero ── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 60px 24px 80px;
  }
 
  .hero-eyebrow {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
  }
 
  .hero h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 300;
    line-height: 1.3;
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--warm);
  }
 
  .hero-desc {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 2;
    color: var(--text-dim);
    max-width: 520px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 1s 0.9s forwards;
  }
 
  .scroll-hint {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeUp 1s 1.4s forwards, pulse 3s 2.4s ease-in-out infinite;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .scroll-hint::after {
    content: '';
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--text-dim), transparent);
    display: block;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }
 
  /* ── Divider ── */
  .divider {
    text-align: center;
    padding: 20px 0 60px;
    position: relative;
  }
  .divider::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 1px;
    background: linear-gradient(to right, transparent, var(--card-border), transparent);
  }
 
  /* ── Write Section ── */
  .write-section {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }
 
  .section-title {
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    margin-bottom: 32px;
    text-align: center;
  }
 
  .write-box {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 32px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 60px rgba(100,160,255,0.05);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .write-box:hover {
    border-color: rgba(126,184,247,0.2);
    box-shadow: 0 0 80px rgba(100,160,255,0.1);
  }
 
  .prompt-text {
    font-size: 15px;
    line-height: 1.9;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .prompt-text strong {
    color: var(--text);
    font-weight: 400;
  }
 
  textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 2;
    padding: 16px 20px;
    resize: none;
    outline: none;
    transition: border-color 0.3s;
    min-height: 120px;
  }
  textarea::placeholder { color: var(--text-dim); opacity: 0.6; }
  textarea:focus { border-color: rgba(126,184,247,0.4); }
 
  .char-count {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 8px;
  }
 
  .tag-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px;
  }
  .tag-label {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    width: 100%;
    margin-bottom: 4px;
  }
  .tag {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--card-border);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .tag:hover, .tag.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(126,184,247,0.08);
  }
 
  .submit-row {
    display: flex; justify-content: space-between;
    align-items: center; margin-top: 24px;
  }
  .anon-note {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .anon-note::before {
    content: '🔒';
    font-size: 12px;
  }
 
  .btn-submit {
    background: linear-gradient(135deg, rgba(126,184,247,0.2), rgba(168,155,212,0.2));
    border: 1px solid rgba(126,184,247,0.3);
    color: var(--accent);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-submit:hover {
    background: linear-gradient(135deg, rgba(126,184,247,0.3), rgba(168,155,212,0.3));
    box-shadow: 0 0 24px rgba(126,184,247,0.2);
    transform: translateY(-1px);
  }
  .btn-submit:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
  }
 
  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(126,184,247,0.15);
    border: 1px solid rgba(126,184,247,0.3);
    color: var(--accent);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 12px 24px;
    border-radius: 8px;
    backdrop-filter: blur(12px);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0; z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
 
  /* ── Wall Section ── */
  .wall-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 120px;
  }
 
  .wall-header {
    text-align: center;
    margin-bottom: 60px;
  }
  .wall-count {
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 300;
    color: var(--warm);
    display: block;
    margin-bottom: 8px;
  }
  .wall-label {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
 
  .wall-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
 
  .wall-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.6s ease forwards;
    opacity: 0;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
  }
  .wall-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(100,160,255,0.1);
    border-color: rgba(126,184,247,0.15);
  }
  .wall-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, var(--c1, transparent), var(--c2, transparent));
  }
 
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
 
  .card-tag {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .card-tag::before {
    content: ''; width: 16px; height: 1px;
    background: var(--text-dim);
    display: inline-block;
  }
 
  .card-text {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    word-break: break-all;
  }
 
  .card-footer {
    margin-top: 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .card-time {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
  }
  .card-glow {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: blip 3s ease-in-out infinite;
  }
  @keyframes blip {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; box-shadow: 0 0 6px var(--accent); }
  }
 
  /* ── Empty State ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    line-height: 2.2;
  }
  .empty-icon { font-size: 40px; display: block; margin-bottom: 16px; opacity: 0.5; }
 
  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px 24px 60px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
    line-height: 2;
    border-top: 1px solid var(--card-border);
  }
  footer a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
 
  /* ── Responsive ── */
  @media (max-width: 600px) {
    .write-box { padding: 24px 20px; }
    .submit-row { flex-direction: column; gap: 16px; align-items: flex-start; }
    .btn-submit { width: 100%; text-align: center; }
  }
</style>
</head>
<body>
 
<div id="stars"></div>
 
<div class="page">
 
  <!-- HERO -->
  <section class="hero">
    <div class="hero-eyebrow">數位遺產專題 × 大學報 NCCU</div>
    <h1>如果今天<br>是你<em>最後一天</em><br>你想留下什麼？</h1>
    <p class="hero-desc">
      當人生留在雲端，那些文字、照片、對話，都可能成為你給世界最後的禮物。<br>
      在這裡，寫下你想留給世界的一句話。匿名，永久。
    </p>
    <div class="scroll-hint">往下留言</div>
  </section>
 
  <!-- WRITE -->
  <section class="write-section">
    <div class="section-title">留下你的話</div>
    <div class="write-box">
      <p class="prompt-text">
        如果你的<strong>數位足跡</strong>只剩一句話，<br>你想讓找到它的人，看見什麼？
      </p>
      <textarea id="msgInput" maxlength="120" placeholder="寫下你想留下的話……（最多 120 字）" rows="4"
        oninput="updateCount()"></textarea>
      <div class="char-count"><span id="charCount">0</span> / 120</div>
 
      <div class="tag-row">
        <div class="tag-label">選一個心情標籤（可略）</div>
        <button class="tag" onclick="selectTag(this, '對家人')">對家人</button>
        <button class="tag" onclick="selectTag(this, '對朋友')">對朋友</button>
        <button class="tag" onclick="selectTag(this, '對自己')">對自己</button>
        <button class="tag" onclick="selectTag(this, '對世界')">對世界</button>
        <button class="tag" onclick="selectTag(this, '對未曾謀面的你')">對未曾謀面的你</button>
      </div>
 
      <div class="submit-row">
        <span class="anon-note">完全匿名，不儲存任何個人資料</span>
        <button class="btn-submit" id="submitBtn" onclick="submitMessage()">送出留言</button>
      </div>
    </div>
  </section>
 
  <div class="divider"></div>
 
  <!-- WALL -->
  <section class="wall-section">
    <div class="wall-header">
      <span class="wall-count" id="wallCount">—</span>
      <div class="wall-label">則留言，靜靜存在於此</div>
    </div>
    <div class="wall-grid" id="wallGrid">
      <div class="empty-state">
        <span class="empty-icon">✦</span>
        成為第一個留下話語的人
      </div>
    </div>
  </section>
 
  <footer>
    此頁面由 <a href="#">政大大學報數位遺產專題</a> 製作 ·
    留言匿名且公開顯示 · 請勿留下個人資訊
  </footer>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
// ── Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 140; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.2 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --d:${Math.random()*4+2}s;
    --delay:${Math.random()*5}s;
    --lo:${Math.random()*0.1};
    --hi:${Math.random()*0.5+0.2};
  `;
  starsEl.appendChild(s);
}
 
// ── State ──
let selectedTag = '';
let messages = [];
 
// ── Storage ──
async function loadMessages() {
  try {
    const result = await window.storage.get('wall-messages', true);
    messages = result ? JSON.parse(result.value) : [];
  } catch(e) {
    messages = [];
  }
  renderWall();
}
 
async function saveMessages() {
  try {
    await window.storage.set('wall-messages', JSON.stringify(messages), true);
  } catch(e) {
    // fallback: in-memory only
  }
}
 
// ── UI ──
function updateCount() {
  const v = document.getElementById('msgInput').value;
  document.getElementById('charCount').textContent = v.length;
}
 
function selectTag(el, tag) {
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  if (selectedTag === tag) {
    selectedTag = '';
  } else {
    el.classList.add('active');
    selectedTag = tag;
  }
}
 
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
 
// ── Tag colors ──
const tagColors = {
  '對家人':     ['#e8a87c', '#c26b4f'],
  '對朋友':     ['#7eb8f7', '#4a7fcc'],
  '對自己':     ['#a89bd4', '#7a68c2'],
  '對世界':     ['#7dd4b8', '#3a9e7c'],
  '對未曾謀面的你': ['#f0c980', '#c8963e'],
  '':           ['rgba(255,255,255,0.06)', 'transparent'],
};
 
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const d = Math.floor(diff / 86400000);
  if (m < 1) return '剛剛';
  if (m < 60) return `${m} 分鐘前`;
  if (h < 24) return `${h} 小時前`;
  return `${d} 天前`;
}
 
function renderWall() {
  const grid = document.getElementById('wallGrid');
  document.getElementById('wallCount').textContent = messages.length;
 
  if (messages.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <span class="empty-icon">✦</span>
      成為第一個留下話語的人
    </div>`;
    return;
  }
 
  const sorted = [...messages].reverse();
  grid.innerHTML = sorted.map((m, i) => {
    const colors = tagColors[m.tag] || tagColors[''];
    return `
      <div class="wall-card" style="animation-delay:${i * 0.05}s; --c1:${colors[0]}; --c2:${colors[1]}">
        ${m.tag ? `<div class="card-tag">${m.tag}</div>` : ''}
        <div class="card-text">${escapeHtml(m.text)}</div>
        <div class="card-footer">
          <span class="card-time">${timeAgo(m.ts)}</span>
          <span class="card-glow"></span>
        </div>
      </div>`;
  }).join('');
}
 
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
async function submitMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) { showToast('請先寫下你的話'); return; }
 
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
 
  const msg = { text, tag: selectedTag, ts: Date.now() };
  messages.push(msg);
  await saveMessages();
  renderWall();
 
  input.value = '';
  updateCount();
  selectedTag = '';
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  btn.disabled = false;
 
  showToast('✦ 你的話已留在這裡了');
 
  // Scroll to wall
  setTimeout(() => {
    document.getElementById('wallGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 400);
}
 
// ── Init ──
loadMessages();
 
// Refresh time labels every minute
setInterval(() => {
  if (messages.length > 0) renderWall();
}, 60000);
</script>
</body>
</html>
